name: Release

# Publishes to npm via trusted publishing (OIDC): no tokens, no OTP.
# One-time setup on npmjs.com: package Settings -> Trusted Publisher ->
# GitHub Actions, repository divyangbissadev/agent-army, workflow release.yml.
# Release flow: bump version in package.json, commit, tag vX.Y.Z, push the tag.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update npm (trusted publishing needs 11.5.1+)
        run: npm install -g npm@latest
      - name: OIDC diagnostics
        run: |
          npm --version
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token endpoint MISSING (id-token permission not effective)"
            exit 1
          fi
          resp=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm%3Aregistry.npmjs.org")
          printf '%s' "$resp" | node -e '
            let d = "";
            process.stdin.on("data", c => d += c).on("end", () => {
              const jwt = JSON.parse(d).value;
              const c = JSON.parse(Buffer.from(jwt.split(".")[1], "base64url").toString());
              const pick = ({repository, repository_owner, repository_id, workflow_ref,
                             job_workflow_ref, environment, event_name, ref, run_attempt}) =>
                ({repository, repository_owner, repository_id, workflow_ref,
                  job_workflow_ref, environment: environment ?? null, event_name, ref, run_attempt});
              console.log("OIDC claims npm will match against:");
              console.log(JSON.stringify(pick(c), null, 2));
            });
          '
      - name: Check tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($pkg)"
            exit 1
          fi
      - name: Run tests
        run: npm test
      - name: Publish to npm
        run: npm publish --access public --loglevel http
      - name: Dump npm debug log on failure
        if: failure()
        run: grep -ihE 'oidc|exchange|http fetch|error' /home/runner/.npm/_logs/*.log | tail -30
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
