name: Release

# Publishes to npm via trusted publishing (OIDC): no tokens, no OTP.
# One-time setup on npmjs.com: package Settings -> Trusted Publisher ->
# GitHub Actions, repository divyangbissadev/agent-army, workflow release.yml.
# Release flow: bump version in package.json, commit, tag vX.Y.Z, push the tag.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update npm (trusted publishing needs 11.5.1+)
        run: npm install -g npm@latest
      - name: OIDC diagnostics
        run: |
          npm --version
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token endpoint available"
          else
            echo "OIDC token endpoint MISSING (id-token permission not effective)"
            exit 1
          fi
      - name: Check tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($pkg)"
            exit 1
          fi
      - name: Run tests
        run: npm test
      - name: Publish to npm
        run: npm publish --access public --loglevel http
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
